      part: 2
      title: "Copilot CLI Tutorial: Your First Session & Commit Summaries in 2026"
    - slug: copilot-cli-vs-copilot-chat
      part: 3
      title: "GitHub Copilot CLI vs VS Code Copilot Chat: Understanding the Evolution"
    - slug: copilot-cli-advanced-usage
      part: 4
      title: "Copilot CLI Advanced Usage & Customization: Automate Multi-Step Workflows in 2026"
    - slug: copilot-cli-troubleshooting
      part: 5
      title: "Troubleshooting & Best Practices for Copilot CLI: Debugging, Security, and Real-World Workflow Fixes in 2026"
    - slug: copilot-cli-learning-series-6-project-build-with-copilot-cli
      part: 6
      title: "Copilot CLI Learning Series #6: Project – Build with Copilot CLI"

